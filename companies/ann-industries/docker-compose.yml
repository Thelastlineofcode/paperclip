# Adriatic Neural Network — PopeBot runtime wired to ann-industries company package
#
# Paperclip provides:  org chart, budget caps, heartbeat config, approval gates
# PopeBot provides:    execution runtime, web UI, branch-per-job, log streaming
#
# Run from this directory:
#   cp .env.example .env && edit .env
#   docker compose up -d
#
# Web UI:  http://${APP_HOSTNAME}  (or localhost if no domain)
# Remote:  set APP_URL to your public URL / Cloudflare tunnel

services:
  traefik:
    image: traefik:v3
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.file.directory=/traefik-config/
      - --entrypoints.web.address=:80
    ports:
      - "3200:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik-config:/traefik-config:ro
    restart: unless-stopped

  adriatic-neural-network:
    container_name: adriatic-neural-network
    image: ${EVENT_HANDLER_IMAGE_URL:-stephengpope/thepopebot:event-handler-latest}
    volumes:
      - .:/project                        # full ann-industries package
      - ./agent-job:/app/agent-job        # CRONS.json + SOUL.md + SUMMARY.md
      - ./event-handler:/app/event-handler # TRIGGERS.json
      - ./skills:/app/skills              # active skills
      - ./.env:/app/.env
      - ./data:/app/data
      - ./logs:/app/logs
      - ./traefik-config:/traefik-config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TRAEFIK_CONFIG_DIR=/traefik-config
    labels:
      - traefik.enable=true
      - traefik.http.routers.adriatic-neural-network.rule=Host(`${APP_HOSTNAME:-localhost}`)
      - traefik.http.routers.adriatic-neural-network.entrypoints=web
      - traefik.http.services.adriatic-neural-network.loadbalancer.server.port=80
    stop_grace_period: 120s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes: {}
